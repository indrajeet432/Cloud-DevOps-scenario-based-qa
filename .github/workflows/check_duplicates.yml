name: Check for Duplicate Questions

on:
  pull_request:
    paths:
      - '**/scenarios.md'
      - 'scripts/check_duplicates.py'
      - '.github/workflows/check_duplicates.yml'

jobs:
  check-duplicates:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Make script executable
        run: chmod +x scripts/check_duplicates.py
      
      - name: Run duplicate check
        id: duplicate_check
        run: |
          python scripts/check_duplicates.py > check_output.txt 2>&1
          exit_code=$?
          cat check_output.txt
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
        continue-on-error: true
      
      - name: Comment on PR if duplicates found
        if: steps.duplicate_check.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('check_output.txt', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ⚠️ Duplicate Questions Detected\n\n\`\`\`\n${output}\n\`\`\`\n\n**Action Required:** Please review your PR and remove or modify duplicate questions before resubmitting.`
            });
      
      - name: Fail if duplicates found
        if: steps.duplicate_check.outputs.exit_code != '0'
        run: exit 1
